<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#3b82f6" />
  
  <!-- Clock ring -->
  <circle cx="50" cy="50" r="28" stroke="white" stroke-width="6" fill="none" />
  
  <!-- Ticks for 12, 3, 6, 9 to emphasize it's a clock -->
  <line x1="50" y1="22" x2="50" y2="28" stroke="white" stroke-width="4" stroke-linecap="round" />
  <line x1="78" y1="50" x2="72" y2="50" stroke="white" stroke-width="4" stroke-linecap="round" />
  <line x1="50" y1="78" x2="50" y2="72" stroke="white" stroke-width="4" stroke-linecap="round" />
  <line x1="22" y1="50" x2="28" y2="50" stroke="white" stroke-width="4" stroke-linecap="round" />
  
  <!-- The hands forming a checkmark (pointing to ~8 o'clock and ~1:30) -->
  <path d="M 36 58 L 50 50 L 68 32" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  
  <!-- Center dot -->
  <circle cx="50" cy="50" r="4" fill="white" />
</svg>